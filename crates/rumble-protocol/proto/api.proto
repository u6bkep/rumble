syntax = "proto3";

package rumble.api.v1;

// =============================================================================
// Core Types
// =============================================================================

// RoomId is a 16-byte UUID.
// The Root room always has UUID 0 (all zeros).
// New rooms are assigned random UUIDs.
message RoomId {
  bytes uuid = 1;  // 16 bytes
}

message UserId {
  uint64 value = 1;
}

// =============================================================================
// User and Room Definitions
// =============================================================================

// User identity and current room membership.
// The current_room field tracks which room the user is in.
// is_muted and is_deafened indicate the user's self-mute/deafen status.
message User {
  UserId user_id = 1;
  string username = 2;
  RoomId current_room = 3;
  bool is_muted = 4;     // User has muted themselves (not transmitting)
  bool is_deafened = 5;  // User has deafened themselves (not receiving audio; implies muted)
  bool server_muted = 6; // User has been server-muted (cannot transmit)
  bool is_elevated = 7;  // User has elevated to superuser via sudo
  // Permission groups this user belongs to (populated for self always, for all users if viewer has MANAGE_ACL).
  repeated string groups = 8;
  // Freeform display marker set by a controller/plugin (e.g. "Mumble", "bot").
  // Meaning is defined by whatever minted the participant; empty for humans.
  optional string label = 9;
}

// Room definition.
// Rooms can be organized hierarchically using parent_id.
message RoomInfo {
  RoomId id = 1;
  string name = 2;
  // Parent room UUID (None/empty for root-level rooms).
  optional RoomId parent_id = 3;
  // Optional description for the room.
  optional string description = 4;
  // Whether this room inherits ACLs from its parent.
  bool inherit_acl = 5;
  // Per-room ACL entries (grant/deny deltas).
  repeated RoomAclEntry acls = 6;
  // Effective permissions for the receiving client in this room (bitmask).
  // Computed per-client by the server; not included in state hash.
  uint32 effective_permissions = 7;
}

// Full state snapshot sent on initial sync and resync.
message ServerState {
  repeated RoomInfo rooms = 1;
  repeated User users = 2;
  // All permission group definitions (for client-side evaluation).
  repeated GroupInfo groups = 3;
  // Slash commands the server's plugins expose, for client-side
  // discovery/autocomplete. Static for a connection; excluded from the
  // state hash (see compute_server_state_hash).
  repeated SlashCommand slash_commands = 4;
}

// A slash command advertised by the server (aggregated across plugins).
message SlashCommand {
  // Command keyword without the leading slash (e.g. "echo").
  string name = 1;
  // One-line human-readable help text.
  string description = 2;
}

// =============================================================================
// Voice Datagram (QUIC unreliable datagrams)
// =============================================================================

// Voice data sent via QUIC datagrams (unreliable, low-latency).
// This is a standalone message not wrapped in Envelope for minimal overhead.
//
// Client -> Server: Only opus_data, sequence, and timestamp_us are set.
//   The server determines sender_id and room_id from the connection.
//
// Server -> Client: All fields are populated by the server.
//   sender_id and room_id are set by the server based on the sender's
//   authenticated identity and current room membership.
message VoiceDatagram {
  // Opus-encoded audio frame (may be empty if end_of_stream is true)
  bytes opus_data = 1;
  
  // Sequence number for ordering/jitter buffer (client should increment)
  uint32 sequence = 2;
  
  // Timestamp in microseconds (client's capture time, for jitter buffer sync)
  // Optional: if not set, receiver can use arrival time
  uint64 timestamp_us = 3;
  
  // End of stream marker. When true, indicates the sender has stopped
  // transmitting (PTT released, VAD triggered, muted, etc.).
  // The receiver should stop expecting packets after this sequence number
  // and not count subsequent missing packets as lost.
  // opus_data may be empty when this is true.
  bool end_of_stream = 4;
  
  // --- Fields set by server on relay, ignored if sent by client ---
  
  // User ID of the sender (set by server based on authenticated connection)
  optional uint64 sender_id = 10;
  
  // Room ID where this audio originated (set by server based on sender's room)
  // This is a UUID (16 bytes)
  optional bytes room_id = 11;
}

// =============================================================================
// Envelope (Reliable Stream Messages)
// =============================================================================

// Generic envelope that carries a single payload and an optional state hash.
// All reliable messages are wrapped in an Envelope.
message Envelope {
  bytes state_hash = 1; // BLAKE3 hash over canonical protobuf serialization
  oneof payload {
    // Authentication (10-19)
    ClientHello client_hello = 10;
    ServerHello server_hello = 11;
    Authenticate authenticate = 15;
    AuthFailed auth_failed = 17;
    
    // Chat and status
    ChatMessage chat_message = 12;
    Disconnect disconnect = 13;
    ServerEvent server_event = 14;
    JoinRoom join_room = 16;
    DirectMessage direct_message = 27;
    CreateRoom create_room = 20;
    DeleteRoom delete_room = 21;
    RenameRoom rename_room = 22;
    MoveRoom move_room = 25;
    SetRoomDescription set_room_description = 26;
    RequestStateSync request_state_sync = 23;
    SetUserStatus set_user_status = 24;
    
    // Registration (40-49)
    RegisterUser register_user = 40;
    UnregisterUser unregister_user = 41;
    CommandResult command_result = 42;

    // ACL Messages (80-93)
    // Client -> Server
    KickUser kick_user = 80;
    BanUser ban_user = 81;
    SetServerMute set_server_mute = 83;
    Elevate elevate = 84;
    CreateGroup create_group = 85;
    DeleteGroup delete_group = 86;
    ModifyGroup modify_group = 87;
    SetUserGroup set_user_group = 88;
    SetRoomAcl set_room_acl = 89;

    // Server -> Client
    PermissionDenied permission_denied = 91;
    UserKicked user_kicked = 92;

    // Controller / Participant Messages (70-79)
    // A "controller" is an out-of-process extension (e.g. a bridge) that mints
    // and drives "participants" — roster members with no connection of their own.
    ControllerHello controller_hello = 70;
    RegisterParticipant register_participant = 71;
    UnregisterParticipant unregister_participant = 72;
    MoveParticipant move_participant = 73;
    SetParticipantStatus set_participant_status = 74;
    ParticipantChat participant_chat = 75;
    ParticipantRegistered participant_registered = 76;

    // File relay (94-99) — reserved, no longer uses envelope payloads
  }
}

// =============================================================================
// Client -> Server Messages
// =============================================================================

// Sent by client immediately after connecting and opening the control stream.
message ClientHello {
  string username = 1;
  bytes public_key = 2;       // Ed25519 public key (32 bytes)
  optional string password = 3; // Server password (required for unknown keys)
}

// Request to join a room.
message JoinRoom {
  RoomId room_id = 1;
}

// Room management requests
message CreateRoom {
  string name = 1;
  // Parent room UUID (None/empty for root-level rooms).
  optional RoomId parent_id = 2;
  // Optional description for the new room.
  optional string description = 3;
}

// Set a room's description.
message SetRoomDescription {
  RoomId room_id = 1;
  string description = 2;
}

message DeleteRoom { 
  RoomId room_id = 1; 
}

message RenameRoom { 
  RoomId room_id = 1; 
  string new_name = 2; 
}

message MoveRoom {
  RoomId room_id = 1;
  RoomId new_parent_id = 2;
}

// Request a full state resync from the server.
// Sent by the client when it detects a state hash mismatch.
message RequestStateSync {
  // The hash the client expected (for debugging/logging).
  bytes expected_hash = 1;
  // The hash the client computed locally (for debugging/logging).
  bytes actual_hash = 2;
}

// Plugin-namespaced sidecar carried alongside a chat message. The
// server forwards this unchanged; the receiving client looks up
// `namespace` in its renderer/handler registry and decodes `payload`
// per the plugin's private schema. Clients without a matching plugin
// display `fallback_text`.
message ChatAttachment {
  // Reverse-DNS plugin identifier (e.g. "rumble.file_transfer.relay").
  string namespace = 1;
  // Schema version for the payload format, plugin-defined.
  uint32 schema_version = 2;
  // Opaque plugin-encoded payload.
  bytes payload = 3;
  // Text shown when no plugin matches `namespace`.
  string fallback_text = 4;
}

// Relay-plugin payload schema. Encoded into ChatAttachment.payload by
// the relay file-transfer plugin. Defined here for build-system
// convenience; semantically owned by `rumble-desktop`'s relay plugin
// and only meaningful when the carrying ChatAttachment has
// `namespace == "rumble.file_transfer.relay"`.
message RelayFileSharePayload {
  // Unique transfer identifier (UUID string). Used by the plugin to
  // key its TransferStatus table; not the chat message id.
  string transfer_id = 1;
  // Original filename.
  string name = 2;
  // File size in bytes.
  uint64 size = 3;
  // MIME type (e.g. "image/jpeg").
  string mime = 4;
  // Opaque relay-specific metadata (e.g. how to fetch from the cache).
  string share_data = 5;
}

// Chat message sent from client to server.
message ChatMessage {
  bytes id = 1;           // 16-byte UUID
  int64 timestamp_ms = 2; // Unix timestamp milliseconds
  string sender = 3;
  string text = 4;        // Human-readable body (also a fallback summary when `attachment` is set).
  // When true, broadcast to sender's room AND all descendant rooms.
  optional bool tree = 5;
  // Optional typed payload (e.g. file offer). Forwarded by the server unchanged.
  optional ChatAttachment attachment = 6;
}

// Direct message sent from one user to another.
// Client -> Server: send a private message to target_user_id.
message DirectMessage {
  uint64 target_user_id = 1;
  string text = 2;
  bytes id = 3;           // 16-byte UUID
  int64 timestamp_ms = 4; // Unix timestamp milliseconds
}

// Graceful disconnect notification.
message Disconnect {
  string reason = 1;
}

// =============================================================================
// Server -> Client Messages
// =============================================================================

// Initial response from server after ClientHello.
message ServerHello {
  bytes nonce = 1;            // Random 32-byte challenge
  string server_name = 2;
  uint64 user_id = 3;         // Assigned user ID for this session
}

// Sent by client to prove key ownership.
message Authenticate {
  bytes signature = 1;        // Ed25519 signature (64 bytes)
  int64 timestamp_ms = 2;     // Unix timestamp in milliseconds
  // Ephemeral session certificate signed by the user's long-term key.
  // This enables peers to attest session identity for P2P flows.
  SessionCertificate session_cert = 3;
}

// Ephemeral session certificate signed by the user's long-term key.
// Peers verify this to bind session-level PeerId to the user key.
message SessionCertificate {
  // Ephemeral Ed25519 public key for this connection (32 bytes).
  bytes session_public_key = 1;
  // Milliseconds since Unix epoch when issued.
  int64 issued_ms = 2;
  // Milliseconds since Unix epoch when the certificate expires.
  int64 expires_ms = 3;
  // Optional client-provided device label (e.g., "desktop", "mobile").
  optional string device = 4;
  // Signature by the user's long-term Ed25519 key over the certificate body.
  bytes user_signature = 5;
}

// Sent by server on authentication failure.
message AuthFailed {
  string error = 1;           // Human-readable error message
}

// Events pushed from server to clients.
message ServerEvent {
  oneof kind {
    ChatBroadcast chat_broadcast = 1;
    // Periodic keep-alive ping from the server.
    KeepAlive keep_alive = 2;
    // Full state snapshot (used for initial sync and resync)
    ServerState server_state = 3;
    // Incremental state update with hash for verification
    StateUpdate state_update = 7;
    // Welcome message (MOTD) sent after authentication
    WelcomeMessage welcome_message = 8;
    // A direct (private) message received from another user.
    DirectMessageReceived direct_message_received = 9;
  }
}

// Welcome message (Message of the Day) sent to clients after authentication.
message WelcomeMessage {
  string text = 1;
}

// Server -> Client: A direct message was received (or sent confirmation).
message DirectMessageReceived {
  uint64 sender_id = 1;
  string sender_name = 2;
  string text = 3;
  bytes id = 4;           // 16-byte UUID
  int64 timestamp_ms = 5;
  uint64 target_user_id = 6;
  string target_username = 7;
}

// Broadcast of a chat message to all connected clients in the same room.
message ChatBroadcast {
  bytes id = 1;           // 16-byte UUID
  int64 timestamp_ms = 2; // Unix timestamp milliseconds
  string sender = 3;
  string text = 4;
  // When true, this message was sent to a tree of rooms.
  optional bool tree = 5;
  // Optional typed payload (e.g. file offer). Forwarded from ChatMessage unchanged.
  optional ChatAttachment attachment = 6;
  // Server-assigned user_id of the authenticated sender (set by server,
  // ignored if sent by client). 0 means "unset" — older servers omit this
  // and clients should fall back to the legacy username comparison.
  uint64 sender_id = 7;
}

// Empty keep-alive message with optional timestamp.
message KeepAlive {
  uint64 epoch_ms = 1;
}

// =============================================================================
// State Synchronization
// =============================================================================

// Incremental state update message.
// Contains a single state change and the expected hash after applying it.
// Client applies the update locally and verifies the resulting hash.
// If mismatch, client requests a full resync.
message StateUpdate {
  // The state hash AFTER this update is applied.
  // Client should compute its local hash after applying and compare.
  bytes expected_hash = 1;
  
  oneof update {
    // A user moved to a different room
    UserMoved user_moved = 10;
    // A new user joined the server
    UserJoined user_joined = 11;
    // A user left the server
    UserLeft user_left = 12;
    // A new room was created
    RoomCreated room_created = 13;
    // A room was deleted
    RoomDeleted room_deleted = 14;
    // A room was renamed
    RoomRenamed room_renamed = 15;
    // A room was moved to a new parent
    RoomMoved room_moved = 17;
    // A room's description changed
    RoomDescriptionChanged room_description_changed = 18;
    // A user's mute/deafen status changed
    UserStatusChanged user_status_changed = 16;
    // A permission group was created/modified/deleted
    GroupChanged group_changed = 20;
    // A user's group membership changed
    UserGroupChanged user_group_changed = 21;
    // A room's ACL entries changed
    RoomAclChanged room_acl_changed = 22;
  }
}

// Incremental update: user moved to a different room.
// The from_room is implicit (tracked on client from User.current_room).
message UserMoved {
  UserId user_id = 1;
  RoomId to_room_id = 2;
}

// Incremental update: new user joined the server.
message UserJoined {
  User user = 1;
}

// Incremental update: user left the server.
message UserLeft {
  UserId user_id = 1;
}

// Incremental update: new room created.
message RoomCreated {
  RoomInfo room = 1;
}

// Incremental update: room deleted.
// Users that were in the room are moved to fallback_room_id (usually Root).
message RoomDeleted {
  RoomId room_id = 1;
  RoomId fallback_room_id = 2;
}

// Incremental update: room renamed.
message RoomRenamed {
  RoomId room_id = 1;
  string new_name = 2;
}

// Incremental update: room moved to a new parent.
message RoomMoved {
  RoomId room_id = 1;
  RoomId new_parent_id = 2;
}

// Incremental update: room description changed.
message RoomDescriptionChanged {
  RoomId room_id = 1;
  string description = 2;
}

// Incremental update: user's mute/deafen status changed.
message UserStatusChanged {
  UserId user_id = 1;
  bool is_muted = 2;
  bool is_deafened = 3;
  bool server_muted = 4;  // User has been server-muted
  bool is_elevated = 5;   // User has elevated to superuser via sudo
}

// =============================================================================
// Client -> Server: User Status
// =============================================================================

// Client notifies server of mute/deafen state changes.
// Server will broadcast UserStatusChanged to all connected clients.
message SetUserStatus {
  bool is_muted = 1;
  bool is_deafened = 2;
}

// =============================================================================
// Registration Messages
// =============================================================================

// Register a user (binds username to public key permanently).
message RegisterUser {
  UserId user_id = 1;         // User to register (allows admin to register others)
}

// Unregister a user (unbinds username from public key).
message UnregisterUser {
  UserId user_id = 1;
}

// =============================================================================
// Command Result (General Response)
// =============================================================================

// Result of a command that can succeed or fail.
// Sent by the server in response to commands like CreateRoom, DeleteRoom,
// RegisterUser, etc. The command field indicates which command this is
// a response to.
message CommandResult {
  // The command this is a response to (e.g., "RegisterUser", "CreateRoom")
  string command = 1;
  // Whether the command succeeded
  bool success = 2;
  // Human-readable message (success confirmation or error description)
  string message = 3;
}

// =============================================================================
// ACL Messages
// =============================================================================

// Permission denied error response.
message PermissionDenied {
  uint32 required_permission = 1;
  bytes room_id = 2;
  string message = 3;
}

// Kick user from server.
message KickUser {
  uint64 target_user_id = 1;
  string reason = 2;
}

// Ban user from server (adds to "banned" group and kicks).
message BanUser {
  uint64 target_user_id = 1;
  string reason = 2;
  // Duration in seconds; 0 = permanent.
  uint64 duration_seconds = 3;
}

// Notification that a user was kicked.
message UserKicked {
  uint64 user_id = 1;
  string reason = 2;
  string kicked_by = 3;
}

// Set server mute on another user.
message SetServerMute {
  uint64 target_user_id = 1;
  bool muted = 2;
}

// Elevate to superuser.
message Elevate {
  string password = 1;
}

// Group management: create a new permission group.
message CreateGroup {
  string name = 1;
  uint32 permissions = 2;
}

// Group management: delete a permission group.
message DeleteGroup {
  string name = 1;
}

// Group management: modify a permission group.
message ModifyGroup {
  string name = 1;
  uint32 permissions = 2;
}

// Group management: add or remove a user from a group.
message SetUserGroup {
  uint64 target_user_id = 1;
  string group = 2;
  bool add = 3;  // true = add to group, false = remove
  uint64 expires_at = 4;  // Unix timestamp in seconds, 0 = no expiry
}

// Room ACL entry (grant/deny delta for a group).
message RoomAclEntry {
  string group = 1;
  uint32 grant = 2;
  uint32 deny = 3;
  bool apply_here = 4;
  bool apply_subs = 5;
}

// Set room ACL entries.
message SetRoomAcl {
  bytes room_id = 1;
  bool inherit_acl = 2;
  repeated RoomAclEntry entries = 3;
}

// Group definition (for state sync).
message GroupInfo {
  string name = 1;
  uint32 permissions = 2;
  bool is_builtin = 3;
}

// State update: room ACL entries changed.
message RoomAclChanged {
  RoomId room_id = 1;
  bool inherit_acl = 2;
  repeated RoomAclEntry entries = 3;
}

// State update: group created/modified/deleted.
message GroupChanged {
  GroupInfo group = 1;
  bool deleted = 2;
}

// State update: user's group membership changed.
message UserGroupChanged {
  uint64 user_id = 1;
  string group = 2;
  bool added = 3;
  uint64 expires_at = 4;
}

// =============================================================================
// Controller / Participant Messages
// =============================================================================

// Client -> Server: Declare this connection as a controller (e.g. a bridge).
// Sent after authentication; gated by the MANAGE_PARTICIPANTS permission.
// The controller's own user entry is hidden from the roster.
message ControllerHello {
  // Display name for the controller (e.g., "Mumble Bridge").
  string controller_name = 1;
}

// Client -> Server: Register a participant driven by this controller.
// Server assigns a user_id and broadcasts UserJoined.
message RegisterParticipant {
  // Display name shown in the roster.
  string username = 1;
  // Freeform display marker (e.g. "Mumble"). Optional.
  optional string label = 2;
  // Stable external identity token. When set, the participant maps to a known
  // identity and inherits its groups; when unset the participant is anonymous
  // and inherits the controller's configured default_participant_group.
  // Unused for now — reserved for stable per-participant ACL.
  optional bytes external_identity = 3;
}

// Server -> Client: Confirmation of participant registration with assigned ID.
message ParticipantRegistered {
  uint64 user_id = 1;
  string username = 2;
}

// Client -> Server: Remove a participant.
message UnregisterParticipant {
  uint64 user_id = 1;
}

// Client -> Server: Move a participant to a room.
message MoveParticipant {
  uint64 user_id = 1;
  RoomId room_id = 2;
}

// Client -> Server: Update a participant's mute/deaf status.
message SetParticipantStatus {
  uint64 user_id = 1;
  bool is_muted = 2;
  bool is_deafened = 3;
}

// Client -> Server: Send a chat message on behalf of a participant.
message ParticipantChat {
  uint64 user_id = 1;
  string text = 2;
  // Optional explicit target room. When absent, the message goes to the
  // participant's current room (legacy behavior). The participant's
  // TEXT_MESSAGE ACL is checked in the target room either way.
  optional RoomId room_id = 3;
  // When true, the message also fans out to all descendants of the target
  // room (tree-message semantics). Absent/false = single room.
  optional bool tree = 4;
}

// =============================================================================
// File Relay Messages — store-and-serve cache (stream protocol, not envelope)
// =============================================================================

// Sent by client on a "file-relay" stream (type discriminator 0x01).
// Followed by raw file bytes.
message RelayUpload {
  string transfer_id = 1;
  string room_id = 2;      // UUID of the room (hex string)
  string file_name = 3;
  uint64 file_size = 4;
  string mime = 5;
}

// Server response to a RelayUpload (length-prefixed on the same stream).
message RelayUploadResponse {
  RelayResult status = 1;
  string error = 2;        // only set on failure
}

// Sent by client on a "file-relay" stream (type discriminator 0x02).
message RelayFetch {
  string transfer_id = 1;
}

// Server response to a RelayFetch (length-prefixed on the same stream).
// Followed by raw file bytes if status == RELAY_RESULT_OK.
message RelayFetchResponse {
  RelayResult status = 1;
  string file_name = 2;
  uint64 file_size = 3;
  string mime = 4;
  string error = 5;        // only set on failure
}

enum RelayResult {
  RELAY_RESULT_UNSPECIFIED = 0;
  RELAY_RESULT_OK = 1;
  RELAY_RESULT_NOT_FOUND = 2;
  RELAY_RESULT_TOO_LARGE = 3;
  RELAY_RESULT_ERROR = 4;
}

// Generic admission-control ack used as the first server→client frame on
// plugin streams that need to validate request metadata before accepting a
// large body. Plugins encode their own reason in `code`/`error`.
//
// Wire pattern (client-initiated stream with body):
//   client → server : [StreamHeader][plugin-specific request metadata]
//   server → client : [length-prefixed PluginStreamAck]
//   if status == OK:
//     client → server : [body...]
//     server → client : [length-prefixed plugin-specific completion response]
//   else:
//     server stops the recv side and closes; client surfaces the ack reason.
message PluginStreamAck {
  PluginAckStatus status = 1;
  // Plugin-specific error code. Meaningful only when status != OK.
  uint32 code = 2;
  // Human-readable detail. Set on rejection.
  string error = 3;
}

enum PluginAckStatus {
  PLUGIN_ACK_STATUS_UNSPECIFIED = 0;
  PLUGIN_ACK_STATUS_OK = 1;
  PLUGIN_ACK_STATUS_REJECTED = 2;
}
