[package]
name = "rumble-client"
description = "Rumble client backend library"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "io-util", "net", "sync", "fs"] }
anyhow = "1"
bytes = "1"
rumble-protocol = { path = "../rumble-protocol" }
rumble-audio = { path = "../rumble-audio" }
rumble-client-traits = { path = "../rumble-client-traits" }
prost = "0.14"
tracing = "0.1"
uuid = { version = "1.19.0", features = ["v4"] }
nnnoiseless = { version = "0.5.2", default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ed25519-dalek = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
tempfile = "3"
