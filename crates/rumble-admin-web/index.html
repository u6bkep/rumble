<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rumble Admin</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #1a1b1e;
            color: #eee;
            font-family: system-ui, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #fallback {
            display: none;
            padding: 2rem;
            max-width: 42rem;
            margin: 0 auto;
            line-height: 1.5;
        }
        #fallback code { background: #2a2a2a; padding: 0.1em 0.4em; border-radius: 4px; }
    </style>
</head>
<body>
    <!-- The Damascene host attaches to this canvas (id must match the
         `with_canvas_id` value in src/lib.rs). -->
    <canvas id="rumble_admin_canvas" tabindex="0"></canvas>
    <div id="fallback">
        <h1>Rumble Admin</h1>
        <p>The wasm UI failed to load. If you are running from source, build the
           bundle with <code>tools/build_admin_web.sh</code>.</p>
        <p>The REST API under <code>/api/</code> is unaffected.</p>
        <pre id="fallback-detail"></pre>
    </div>
    <script type="module">
        import init from './pkg/rumble_admin_web.js';
        init().catch(err => {
            console.error('rumble-admin-web failed to start:', err);
            document.getElementById('rumble_admin_canvas').style.display = 'none';
            document.getElementById('fallback').style.display = 'block';
            document.getElementById('fallback-detail').textContent = String(err);
        });
    </script>
</body>
</html>
