[workspace]
resolver = "3"
members = [
    "crates/*",
    "xtask",
]
exclude = [
    "docker/p2p-test",
    "docker/backend-p2p-test",
    # Vendored UI library — has its own workspace.
    "vendor/aetna",
]

[workspace.dependencies]
ed25519-dalek = { version = "3.0.0-pre.4", features = ["rand_core"] }
rand = "0.10.0-rc.3"
rand_core = "0.10.0-rc.3"

# Aetna UI library — pinned by git rev to upstream computer-whisperer/aetna.
# Override locally with `[patch."https://github.com/computer-whisperer/aetna"]`
# (or `scripts/aetna-local.sh`) if iterating on aetna alongside rumble.
aetna-core = { git = "https://github.com/computer-whisperer/aetna", rev = "b8e64bdc4356fb26ea99dab2f0b2493106a9ba71" }
aetna-wgpu = { git = "https://github.com/computer-whisperer/aetna", rev = "b8e64bdc4356fb26ea99dab2f0b2493106a9ba71" }
aetna-winit-wgpu = { git = "https://github.com/computer-whisperer/aetna", rev = "b8e64bdc4356fb26ea99dab2f0b2493106a9ba71" }

# Local fork of egui 0.33.3 with a small hit_test fix: also filter
# NaN out of `WidgetRect.rect` (not just `interact_rect`). egui's
# upstream filter only checks `interact_rect`, but `WidgetRect` derives
# `PartialEq` over every field — so a NaN in `rect` makes
# `position(...).unwrap()` at hit_test.rs:364 panic. See
# https://github.com/emilk/egui/issues/7870 (still open as of writing).
# Drop this block when the upstream fix lands.
[patch.crates-io]
egui = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
emath = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
epaint = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
epaint_default_fonts = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
ecolor = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
eframe = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
egui-winit = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
egui_extras = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
egui_glow = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
egui-wgpu = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }
egui_kittest = { git = "https://github.com/u6bkep/egui.git", branch = "rumble-fix-hit-test-nan-rect" }